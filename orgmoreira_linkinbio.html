<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORG Moreira</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; min-height: 100vh; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; }
  .wrap { width: 100%; max-width: 480px; padding: 0 0 48px; }
  .header { text-align: center; padding: 40px 20px 20px; }
  .avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #FFD700; margin: 0 auto 14px; display: block; background: #1a1a1a; overflow: hidden; }
  .name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #FFD700; letter-spacing: 3px; margin-bottom: 4px; }
  .sub { font-size: 15px; color: #888; letter-spacing: 1px; }
  .slogan { margin: 20px 20px 28px; border: 1.5px solid #FFD700; border-radius: 14px; padding: 16px; background: rgba(255,215,0,0.05); display: flex; align-items: center; gap: 14px; }
  .slogan-icon { width: 60px; height: 60px; border-radius: 50%; background: #0a2a06; border: 2px solid #FFD700; flex-shrink: 0; overflow: hidden; }
  .slogan-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #FFD700; letter-spacing: 1px; line-height: 1.2; }
  .slogan-text { font-size: 13px; color: #ccc; line-height: 1.5; margin-top: 2px; }
  .btns { padding: 0 20px; display: flex; flex-direction: column; gap: 14px; }

  .btn {
    display: flex; align-items: center; gap: 14px;
    border-radius: 50px; padding: 14px 22px;
    text-decoration: none; cursor: pointer; border: none; width: 100%;
    position: relative; overflow: hidden;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease;
  }
  .btn::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50px;
    background: rgba(255,255,255,0.12);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .btn:hover { transform: translateY(-3px) scale(1.02); }
  .btn:hover::after { opacity: 1; }
  .btn:active { transform: scale(0.96) translateY(0); }

  .btn.gold {
    background: #FFD700;
    box-shadow: 0 4px 0 #b89a00;
  }
  .btn.gold:hover {
    box-shadow: 0 8px 20px rgba(255,215,0,0.35), 0 4px 0 #b89a00;
  }
  .btn.gold:active { box-shadow: 0 1px 0 #b89a00; }

  .btn.dark {
    background: #1a1a1a;
    border: 1.5px solid #FFD700;
    box-shadow: 0 4px 0 #3a3000;
  }
  .btn.dark:hover {
    box-shadow: 0 8px 22px rgba(255,215,0,0.2), 0 4px 0 #3a3000;
    border-color: #ffe566;
  }
  .btn.dark:active { box-shadow: 0 1px 0 #3a3000; }

  .btn-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.18s cubic-bezier(.34,1.56,.64,1); }
  .btn:hover .btn-icon { transform: rotate(-8deg) scale(1.15); }
  .btn.gold .btn-icon { background: #1a1a1a; }
  .btn.dark .btn-icon { background: #FFD700; }
  .btn-icon svg { width: 22px; height: 22px; }

  .btn-label { flex: 1; text-align: left; }
  .btn-title { font-family: 'Bebas Neue', sans-serif; font-size: 21px; letter-spacing: 2px; line-height: 1.1; }
  .btn.gold .btn-title { color: #1a1a1a; }
  .btn.dark .btn-title { color: #FFD700; }
  .btn-handle { font-size: 13px; color: #888; letter-spacing: 1px; }

  .btn-arrow {
    font-size: 22px; font-weight: 700;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
    display: inline-block;
  }
  .btn:hover .btn-arrow { transform: translateX(5px); }
  .btn.gold .btn-arrow { color: #1a1a1a; }
  .btn.dark .btn-arrow { color: #FFD700; }

  .footer { text-align: center; margin-top: 36px; font-size: 12px; color: #444; letter-spacing: 2px; }
</style>
</head>

<script>
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('touchstart', () => btn.classList.add('touch'), {passive:true});
    btn.addEventListener('touchend', () => setTimeout(() => btn.classList.remove('touch'), 300), {passive:true});

    btn.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 1.5;
      const x = (e.clientX || rect.left + rect.width/2) - rect.left - size/2;
      const y = (e.clientY || rect.top + rect.height/2) - rect.top - size/2;
      ripple.style.cssText = `
        position:absolute; border-radius:50%; pointer-events:none;
        width:${size}px; height:${size}px; left:${x}px; top:${y}px;
        background:rgba(255,255,255,0.25);
        transform:scale(0); animation:ripple 0.5s ease-out forwards;
      `;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
</script>
<style>
  @keyframes ripple {
    to { transform: scale(1); opacity: 0; }
  }
</style>
